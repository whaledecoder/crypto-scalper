# Replit overlay — paper mode, port 8080, no dead zone, 1m candles
[mode]
run_mode = "paper"
dry_run  = true

[pairs]
timeframes = ["1m"]

[strategy]
min_ta_confidence = 60

[schedule]
dead_zone_start_hour_wib = 0
dead_zone_end_hour_wib   = 0

[llm]
timeout_secs          = 30
fallback_ta_threshold = 60

[risk]
equity_usd             = 5000.0
risk_per_trade_pct     = 0.5
max_open_positions     = 3
max_daily_loss_pct     = 3.0
max_drawdown_pct       = 10.0
min_reward_risk        = 1.0
min_net_edge_bps       = 0.0
max_spread_pct         = 0.10

[survival]
auto_flat_drawdown_pct = 20.0

[monitoring]
metrics_bind = "0.0.0.0:8080"
