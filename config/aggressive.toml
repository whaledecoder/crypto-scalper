# Aggressive paper overlay for fast local visibility.
# Keeps dry_run=true: no real Binance orders are sent with this overlay.

[mode]
run_mode = "paper"
dry_run = true

[pairs]
timeframes = ["1m"]

[strategy]
min_ta_confidence = 55

[risk]
risk_per_trade_pct = 0.75
max_open_positions = 3
max_daily_loss_pct = 4.0
max_drawdown_pct = 12.0
max_spread_pct = 0.08
min_reward_risk = 1.05
min_net_edge_bps = 0.0
equity_usd = 5000.0

[manager]
enabled = false

[survival]
loss_streak_short = 3
loss_streak_short_cooldown_min = 30
loss_streak_long = 5
loss_streak_long_window_min = 60
loss_streak_long_cooldown_min = 180
daily_loss_count = 8
auto_flat_drawdown_pct = 8.0
daily_pnl_ratchet_pct = 2.0
